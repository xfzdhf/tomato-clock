<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>时流</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <!-- ===== Top Bar ===== -->
    <header id="top-bar">
      <span class="logo">⏳ 时流</span>
      <div class="top-actions">
        <button id="btn-settings" class="icon-btn" aria-label="设置">⚙️</button>
        <button id="btn-plus" class="plus-btn" aria-label="新建">＋</button>
      </div>
    </header>

    <!-- ===== Plus Menu Popover ===== -->
    <div id="plus-menu" class="popover" style="display:none"></div>

    <!-- ===== Main Content ===== -->
    <main id="main-content">
      <!-- Home / Todo Screen -->
      <section id="screen-home" class="screen active">
        <div class="filter-bar" id="filter-bar">
          <button class="filter-btn active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="long">长期</button>
          <button class="filter-btn" data-filter="short">短期</button>
          <button class="filter-btn" data-filter="done">已完成</button>
        </div>
        <div class="unified-list" id="unified-list"></div>
      </section>

      <!-- Todo Screen -->
      <section id="screen-todos" class="screen">
        <div class="unified-list" id="todo-list"></div>
      </section>

      <!-- Stats Screen -->
      <section id="screen-stats" class="screen">
        <div class="stats-range" id="stats-range">
          <button class="range-btn active" data-range="day">日</button>
          <button class="range-btn" data-range="week">周</button>
          <button class="range-btn" data-range="month">月</button>
        </div>

        <div class="stats-summary" id="stats-summary"></div>

        <div class="section-title">专注分布</div>
        <div class="progress-list" id="progress-list"></div>

        <div class="section-title">每日专注时长（近7天）</div>
        <div class="bar-chart" id="bar-chart"></div>
      </section>
    </main>

    <!-- ===== Timer Overlay ===== -->
    <div id="timer-overlay" class="overlay" style="display:none">
      <div class="wallpaper-bg" id="wallpaper-bg"></div>
      <div class="wallpaper-overlay"></div>
      <div class="timer-top">
        <button id="btn-back" class="back-btn">← 返回</button>
        <div class="focus-target" id="focus-target-name"></div>
        <button id="btn-wallpaper" class="wallpaper-btn" title="换肤">🖼</button>
      </div>
      <div class="timer-body">
        <div class="mode-toggle" id="mode-toggle">
          <button class="mode-btn active" data-mode="countdown">倒计时</button>
          <button class="mode-btn" data-mode="stopwatch">正计时</button>
        </div>
        <div class="duration-set" id="duration-set">
          <button class="dur-adj" id="btn-dur-minus">−</button>
          <span class="dur-val" id="dur-display">25 分钟</span>
          <button class="dur-adj" id="btn-dur-plus">＋</button>
        </div>
        <div class="timer-container">
          <svg class="timer-ring" viewBox="0 0 200 200">
            <circle class="ring-bg" cx="100" cy="100" r="88"/>
            <circle class="ring-fg" id="ring-progress" cx="100" cy="100" r="88"
              stroke-dasharray="553" stroke-dashoffset="0"/>
          </svg>
          <div class="timer-center">
            <div class="timer-time" id="timer-display">25:00</div>
            <div class="timer-label" id="timer-label">准备专注</div>
          </div>
        </div>
        <div class="session-dots" id="session-dots"></div>
        <div class="timer-controls">
          <button class="btn-round btn-play" id="btn-play">▶ 开始</button>
          <button class="btn-round btn-skip" id="btn-skip" style="display:none">⏭ 跳过</button>
        </div>
        <div class="timer-stats">
          <div class="today-stats" id="today-stats"></div>
          <div class="item-focus-stats" id="item-focus-stats"></div>
        </div>
      </div>
    </div>

    <!-- ===== Modal ===== -->
    <div id="modal-overlay" style="display:none">
      <div class="modal" id="modal-content"></div>
    </div>

    <!-- ===== Bottom Nav ===== -->
    <nav id="tab-bar">
      <button class="tab active" data-tab="home">📋 待办</button>
      <button class="tab" data-tab="todos">📝 待办集</button>
      <button class="tab" data-tab="stats">📊 统计</button>
    </nav>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
